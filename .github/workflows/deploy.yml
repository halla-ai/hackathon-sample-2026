# Azure App Service deploy template.
#
# This workflow is committed in a disabled state. To enable for your team:
#
# 1. In your team's GitHub repo: Settings -> Secrets and variables -> Actions
#    Add the following secrets:
#      AZURE_APP_NAME           e.g. app-koicatiu-team05
#      AZURE_PUBLISH_PROFILE    paste the XML from App Service -> "Get publish profile"
#
# 2. Remove the `if: false` line from the deploy job below.
#
# 3. Push to main. The workflow builds the app, runs tests, and deploys to App Service.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: false   # remove this line to enable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

      - name: Stage deploy artifact
        run: |
          mkdir -p deploy
          cp -r src static requirements.txt deploy/
          (cd deploy && zip -r ../deploy.zip .)

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy.zip
